name: CI — Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pyyaml pydantic mcp httpx
          pip install pytest ruff

      - name: Lint
        run: ruff check tools/ server/

      - name: Run tests
        run: pytest tests/test_convert.py tests/test_common.py tests/test_render.py tests/test_risk_assess.py tests/test_optimize.py -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t osop-mcp .
